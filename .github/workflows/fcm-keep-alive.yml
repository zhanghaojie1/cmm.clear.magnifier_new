name: FCM Keep Alive Topic Push

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  push_keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir google-auth requests

      - name: Push keep-alive message to FCM topic
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FCM_TOPIC: ${{ secrets.FCM_TOPIC }}
        run: |
          python - <<'PY'
          import json
          import os
          import requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request

          required = ["FIREBASE_PROJECT_ID", "GOOGLE_SERVICE_ACCOUNT_JSON", "FCM_TOPIC"]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              raise SystemExit(f"Missing required secrets: {', '.join(missing)}")

          project_id = os.environ["FIREBASE_PROJECT_ID"].strip()
          topic = os.environ["FCM_TOPIC"].strip()
          service_account_info = json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"])

          credentials = service_account.Credentials.from_service_account_info(
              service_account_info,
              scopes=["https://www.googleapis.com/auth/firebase.messaging"],
          )
          credentials.refresh(Request())

          url = f"https://fcm.googleapis.com/v1/projects/{project_id}/messages:send"
          payload = {
              "message": {
                  "topic": topic,
                  "data": {
                      "type": "keep_alive",
                      "source": "github-actions"
                  },
                  "android": {
                      "priority": "high"
                  }
              }
          }

          resp = requests.post(
              url,
              headers={
                  "Authorization": f"Bearer {credentials.token}",
                  "Content-Type": "application/json",
              },
              json=payload,
              timeout=30,
          )

          print("FCM status:", resp.status_code)
          print(resp.text)
          resp.raise_for_status()
          PY
