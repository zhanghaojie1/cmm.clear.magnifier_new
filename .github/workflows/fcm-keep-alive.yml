# .github/workflows/fcm_test_min.yml
name: FCM Test Minimal

on:
  workflow_dispatch:

jobs:
  send_test_fcm:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install firebase-admin
        run: pip install --no-cache-dir firebase-admin

      - name: Send test FCM message
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FCM_TOPIC: ${{ secrets.FCM_TOPIC }}
        run: |
          python - <<'PY'
          import json
          import os
          import firebase_admin
          from firebase_admin import credentials, messaging

          # 检查 Secrets
          required = ["GOOGLE_SERVICE_ACCOUNT_JSON", "FCM_TOPIC"]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              raise SystemExit(f"Missing required secrets: {', '.join(missing)}")

          topic = os.environ["FCM_TOPIC"].strip()
          service_account_info = json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"])

          # 初始化 Firebase Admin SDK
          cred = credentials.Certificate(service_account_info)
          firebase_admin.initialize_app(cred)

          # 构造测试消息
          message = messaging.Message(
              data={"type": "test_push", "source": "github-actions"},
              topic=topic,
              android=messaging.AndroidConfig(priority="high")
          )

          # 发送消息
          response = messaging.send(message)
          print("✅ Test FCM message sent successfully. Message ID:", response)
          PY
